    <style>
        :root {
            --safe-area-inset-top: env(safe-area-inset-top, 0px);
            --safe-area-inset-right: env(safe-area-inset-right, 0px);
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-inset-left: env(safe-area-inset-left, 0px);
        }

        body {
            background-color: #040b16;
            color: white;
            margin: 0;
            font-family: -apple-system;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: var(--safe-area-inset-bottom);
        }

        #root > div > div:first-child {
            top: var(--safe-area-inset-top, 0px) !important;
            padding-top: 1rem !important;
            padding-left: max(1rem, calc(var(--safe-area-inset-left, 0px) + 1rem)) !important;
            padding-right: max(1rem, calc(var(--safe-area-inset-right, 0px) + 1rem)) !important;
        }

        /* Reduce mobile browser text selection toolbar interference */
        .cm-editor,
        .cm-content {
            -webkit-user-select: text;
            user-select: text;
        }

        .cm-editor * {
            -webkit-touch-callout: default;
        }

        .boot-screen {
            position: fixed;
            inset: 0;
            background: #040b16;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .boot-loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #root:not(:empty)+.boot-screen {
            opacity: 0;
            pointer-events: none;
        }

        .rescue-link {
            position: fixed;
            bottom: calc(30px + env(safe-area-inset-bottom));
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            color: #3b82f6;
            text-decoration: underline;
            z-index: 10000;
            font-weight: bold;
            letter-spacing: 0.5px;
            padding: 16px 0;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            background: none;
            border: none;
            font-family: -apple-system;
        }
        .rescue-link:active {
            color: #60a5fa;
        }
        .boot-screen .rescue-link {
            pointer-events: auto;
        }

        /* Solution 37: Remove ALL constraints - let content expand naturally */
        div[data-problem-description],
        div.problem-description-scroll,
        div[data-problem-description].problem-description-scroll,
        #root div[data-problem-description],
        body #root div[data-problem-description],
        body #root div[style*="maxHeight"] div[data-problem-description] {
            text-overflow: clip !important;
            overflow-y: visible !important;
            overflow-x: hidden !important;
            max-height: none !important;
            min-height: auto !important;
            height: auto !important;
            -webkit-line-clamp: unset !important;
            line-clamp: unset !important;
            display: block !important;
            white-space: pre-wrap !important;
            word-wrap: break-word !important;
            overflow-wrap: break-word !important;
            -webkit-box-orient: unset !important;
            box-orient: unset !important;
            overflow: visible !important;
        }
    </style>

    <script>
        // ── GLOBAL ERROR CATCHER ──
        window.addEventListener('error', function (e) {
            var bootError = document.getElementById('bootError');
            var fallback = document.getElementById('bootFallback');
            if (bootError) {
                bootError.textContent = '⚠️ Error: ' + (e.message || 'App failed to load');
            }
            if (fallback) {
                fallback.style.display = 'block';
            }
        });
    </script>
    <script>
        // ── FORCE CACHE CLEAR ──────────────────────────────────────────
        // Runs before ANY module loads. If version changed, wipe everything
        // and reload. This ensures fresh content on every deploy.
        // ───────────────────────────────────────────────────────────────
        (function () {
            var APP_VERSION = 'v237';
            var prevVersion = localStorage.getItem('app_version');
            var alreadyCleared = sessionStorage.getItem('cache_cleared');

            var forceReset = new URLSearchParams(window.location.search).has('reset-cache');

            if (forceReset || (!alreadyCleared && prevVersion && prevVersion !== APP_VERSION)) {
                // Wipe all caches + kill service workers before page loads
                if (window.caches) {
                    caches.keys().then(function (keys) {
                        return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                    }).then(function () {
                        if (navigator.serviceWorker) {
                            return navigator.serviceWorker.getRegistrations().then(function (regs) {
                                return Promise.all(regs.map(function (r) { return r.unregister(); }));
                            });
                        }
                    }).then(function () {
                        localStorage.setItem('app_version', APP_VERSION);
                        sessionStorage.setItem('cache_cleared', '1');
                        var cleanUrl = new URL(window.location.href);
                        cleanUrl.searchParams.delete('reset-cache');
                        cleanUrl.searchParams.set('cache', Date.now().toString());
                        window.location.replace(cleanUrl.toString());
                    }).catch(function () {
                        // Fallback: just reload
                        localStorage.setItem('app_version', APP_VERSION);
                        sessionStorage.setItem('cache_cleared', '1');
                        window.location.reload();
                    });
                } else {
                    localStorage.setItem('app_version', APP_VERSION);
                    sessionStorage.setItem('cache_cleared', '1');
                }
            } else {
                localStorage.setItem('app_version', APP_VERSION);
            }
        })();
    </script>
    <style>
        /* Hide everything until cache check completes — prevents flash of cached content */
        .cache-check-pending body,
        .cache-check-pending #root,
        .cache-check-pending .boot-screen {
            display: none !important;
        }
    </style>

</head>

<body>
    <div id="root"></div>
    <div class="boot-screen" id="boot">
        <div class="boot-loader"></div>
        <p style="margin-top: 20px; font-weight: 900; font-size: 12px; letter-spacing: 2px; color: #3b82f6;">CONNECTING
            TO EDITOR...</p>
        <p style="margin-top: 8px; font-size: 10px; color: #4b5563;">Please wait for Python engine</p>
        <div id="bootFallback" style="display:none; margin-top: 30px; text-align: center;">
            <p style="color: #f59e0b; font-size: 12px; font-weight: 900; letter-spacing: 1px;">
                ⚡ Taking longer than expected?
            </p>
            <div style="margin-top: 16px; display: flex; flex-direction: column; gap: 12px; align-items: center;">
                <button id="rescueBtn" class="rescue-link" style="position:static; display:inline-block; background:#1d2d44; color:white; padding:14px 28px; border-radius:16px; font-weight:900; font-size:10px; text-transform:uppercase; letter-spacing:2px; text-decoration:none;">
                    Force Clear Cache &amp; Reload
                </button>
                <button id="bypassModuleBtn" style="background:#7c3aed; color:white; padding:12px 24px; border-radius:16px; font-weight:900; font-size:10px; text-transform:uppercase; letter-spacing:2px; cursor:pointer; border:none;">
                    Try Lite Mode (No AI)
                </button>
            </div>
            <p id="bootError" style="margin-top: 16px; color: #ef4444; font-size: 11px;"></p>
        </div>
        <script>
            // ── BOOT TIMEOUT: show fallback options if app doesn't mount within 15s ──
            var bootCheckInterval = setInterval(function () {
                var root = document.getElementById('root');
                if (root && root.children.length > 0) {
                    clearInterval(bootCheckInterval);
                    return;
                }
            }, 500);
            setTimeout(function () {
                clearInterval(bootCheckInterval);
                var fallback = document.getElementById('bootFallback');
                if (fallback && document.getElementById('root') && document.getElementById('root').children.length === 0) {
                    fallback.style.display = 'block';
                }
            }, 15000);

            document.getElementById('rescueBtn').addEventListener('click', function (e) {
                this.textContent = 'Clearing cache...';
                var clearCaches = window.caches
                    ? caches.keys().then(function (keys) {
                        return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                    })
                    : Promise.resolve();
                clearCaches.then(function () {
                    if (!navigator.serviceWorker) return [];
                    return navigator.serviceWorker.getRegistrations();
                }).then(function (regs) {
                    return Promise.all((regs || []).map(function (r) { return r.unregister(); }));
                }).then(function () {
                    sessionStorage.removeItem('cache_cleared');
                    var nextUrl = new URL(location.href);
                    nextUrl.searchParams.set('cache', Date.now().toString());
                    location.replace(nextUrl.toString());
                }).catch(function () {
                    location.reload();
                });
            });

            document.getElementById('bypassModuleBtn').addEventListener('click', function () {
                sessionStorage.setItem('lite_mode', '1');
                // Try a direct reload with lite mode flag
                var nextUrl = new URL(location.href);
                nextUrl.searchParams.set('lite', '1');
                nextUrl.searchParams.set('cache', Date.now().toString());
                location.replace(nextUrl.toString());
            });
        </script>
    </div>
    <script>
        // Service worker registration (browsers that support ES modules)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                try {
                    navigator.serviceWorker.register('./sw.js?v=v237', {
                        updateViaCache: 'none',
                        scope: './'
                    });
                } catch (err) {
                    console.error('Service worker registration failed:', err);
                }
            });
        }
    </script>
    <script>
        var makeEditorCompact = function () {
            const editors = Array.from(document.querySelectorAll('.cm-editor'));
            for (const editor of editors) {
                const wrapper = editor.parentElement;
                if (!(editor instanceof HTMLElement) || !(wrapper instanceof HTMLElement)) continue;
                if (editor.dataset.compactEditor === 'true') continue;

                editor.dataset.compactEditor = 'true';
                wrapper.style.minHeight = '320px';
                editor.style.height = '320px';
            }
        };

        const makeOutputScrollable = () => {
            const labels = Array.from(document.querySelectorAll('span')).filter(
                (node) => node.textContent && node.textContent.trim() === 'Output'
            );

            for (const label of labels) {
                const header = label.closest('div');
                const output = header?.nextElementSibling;

                if (!(output instanceof HTMLElement) || output.dataset.outputScrollable === 'true') continue;

                output.dataset.outputScrollable = 'true';
                output.style.height = '85px';
                output.style.minHeight = '85px';
                output.style.maxHeight = '50vh';
                output.style.overflowY = 'auto';
                output.style.webkitOverflowScrolling = 'touch';
                output.style.touchAction = 'pan-y';
                output.style.resize = 'vertical';
            }
        };

        window.addEventListener('load', () => {
            let attempts = 0;
            const intervalId = window.setInterval(() => {
                makeEditorCompact();
                makeOutputScrollable();
                attempts += 1;
                if ((document.querySelector('[data-output-scrollable="true"]') && document.querySelector('[data-compact-editor="true"]')) || attempts > 20) {
                    window.clearInterval(intervalId);
                }
            }, 500);
        });
    </script>
